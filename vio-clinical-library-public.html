ivered together at IV concentrations. Supporting B vitamins included for cellular energy.", "categories": ["Your Wellness"], "concerns": ["Skin quality", "Immune support", "Energy & vitality"], "treatment": "Glow IV", "keywords": "glow IV what contains glutathione vitamin C antioxidant skin luminosity"}, {"id": "iglo2", "type": "treatment", "question": "How often should I get Glow IV for skin results?", "answer": "Biweekly to monthly for consistent skin quality improvement. The effect on melanin production and skin tone is cumulative.", "categories": ["Your Wellness"], "concerns": ["Skin quality", "Maintenance"], "treatment": "Glow IV", "keywords": "glow IV how often frequency biweekly monthly skin results cumulative"}, {"id": "nad1", "type": "treatment", "question": "What is NAD+ and why does it matter?", "answer": "NAD+ is a coenzyme foundational to how cells produce energy, repair DNA, and regulate aging pathways. Levels decline significantly with age, illness, and oxidative stress \u2014 and the decline affects cellular energy, DNA repair, and metabolic function across the whole body.", "categories": ["Your Wellness"], "concerns": ["Energy & vitality", "Cognitive & mood"], "treatment": "NAD+ Injections", "keywords": "NAD+ what is coenzyme cellular energy ATP DNA repair sirtuins decline aging"}, {"id": "nad2", "type": "treatment", "question": "Why inject NAD+ rather than take oral supplements?", "answer": "Oral precursors like NMN must be converted to NAD+ before use \u2014 conversion efficiency is variable. IM or IV delivery places NAD+ directly into the bloodstream for immediate cellular availability at therapeutic concentrations.", "categories": ["Your Wellness"], "concerns": ["Energy & vitality", "Cognitive & mood"], "treatment": "NAD+ Injections", "keywords": "NAD+ injection vs oral supplement NMN conversion bioavailability IM IV direct"}, {"id": "nad3", "type": "treatment", "question": "What do clients notice from NAD+ injections?", "answer": "Sustained, clean energy without stimulant quality. Improved recovery from physical exertion. Some report improved mood and stress resilience. The cellular repair and longevity pathway activation represents the deeper clinical rationale.", "categories": ["Your Wellness"], "concerns": ["Energy & vitality", "Cognitive & mood"], "treatment": "NAD+ Injections", "keywords": "NAD+ what clients notice energy cognitive clarity recovery mood"}, {"id": "b121", "type": "treatment", "question": "Why methylcobalamin and not regular B12?", "answer": "Methylcobalamin is the active, neurologically-preferred form of B12 \u2014 the form the body can use directly. Cyanocobalamin must be converted, and individuals with MTHFR variants may have impaired conversion. VIO uses methylcobalamin because it delivers the active form directly.", "categories": ["Your Wellness"], "concerns": ["Energy & vitality", "Cognitive & mood"], "treatment": "B12 Shots", "keywords": "B12 methylcobalamin vs cyanocobalamin why active form MTHFR conversion"}, {"id": "b122", "type": "treatment", "question": "Who benefits most from B12 injections?", "answer": "Clients with low or low-normal B12 \u2014 vegetarians and vegans, adults over 50 with declining intrinsic factor, those with digestive conditions affecting absorption, and anyone on metformin (which depletes B12 over time).", "categories": ["Your Wellness"], "concerns": ["Energy & vitality"], "treatment": "B12 Shots", "keywords": "B12 who benefits vegetarian vegan over 50 intrinsic factor metformin"}, {"id": "bio1", "type": "treatment", "question": "What does biotin do and why inject it?", "answer": "Biotin is an essential cofactor for keratin production \u2014 the structural protein of hair, skin, and nails. IM delivery achieves tissue concentrations that oral supplementation may not reliably reach due to digestive absorption variability.", "categories": ["Your Wellness"], "concerns": ["Hair health", "Skin quality"], "treatment": "Biotin Injections", "keywords": "biotin what does it do keratin hair nails skin IM vs oral absorption"}, {"id": "bio2", "type": "treatment", "question": "Will biotin injections regrow lost hair?", "answer": "Biotin supports the keratin infrastructure hair is built from \u2014 a nutritional foundation, not a standalone growth driver. If thinning has a deficiency component, addressing it can meaningfully help. For genetic or hormonal hair loss, biotin is part of a complete picture alongside PRF and scalp treatment.", "categories": ["Your Wellness"], "concerns": ["Hair health"], "treatment": "Biotin Injections", "keywords": "biotin hair regrowth deficiency keratin foundation not standalone alopecia"}, {"id": "tri1", "type": "treatment", "question": "What is the Tri-Immune injection?", "answer": "The Tri-Immune injection combines Glutathione, Vitamin C, and Zinc intramuscularly \u2014 three nutrients with distinct and complementary roles in immune function. Addresses multiple immune pathways in a single injection at concentrations that exceed what oral supplementation achieves.", "categories": ["Your Wellness"], "concerns": ["Immune support"], "treatment": "Tri-Immune Injections", "keywords": "tri-immune injection what is glutathione vitamin C zinc IM immune synergy"}, {"id": "tri2", "type": "treatment", "question": "When is the Tri-Immune injection most useful?", "answer": "Proactively before high-exposure seasons, immediately after known illness exposure, during recovery to rebuild immune resilience, or as part of an ongoing protocol for clients whose immune function is chronically stressed.", "categories": ["Your Wellness"], "concerns": ["Immune support"], "treatment": "Tri-Immune Injections", "keywords": "tri-immune when useful proactive flu season travel exposure recovery immune"}, {"id": "lip1", "type": "treatment", "question": "What are lipotropic injections?", "answer": "Lipotropic injections deliver MIC (Methionine, Inositol, Choline) plus B12 intramuscularly. These compounds support hepatic fat metabolism \u2014 the liver's role in processing and exporting lipids. Most effective as part of a broader metabolic health plan.", "categories": ["Your Wellness"], "concerns": ["Weight & metabolism", "Energy & vitality"], "treatment": "Lipotropic Injections", "keywords": "lipotropic injections MIC what are methionine inositol choline B12 liver fat"}, {"id": "lip2", "type": "treatment", "question": "Are lipotropic injections effective for weight loss?", "answer": "They support metabolic health at the hepatic level \u2014 not a fat-burning treatment on their own. Their value is as an adjunct within a broader metabolic plan supporting liver function while other interventions drive the primary metabolic change.", "categories": ["Your Wellness"], "concerns": ["Weight & metabolism"], "treatment": "Lipotropic Injections", "keywords": "lipotropic weight loss effective liver metabolic support adjunct not standalone"}, {"id": "hor1", "type": "treatment", "question": "What does hormone support involve at VIO?", "answer": "Hormone support begins with labs \u2014 comprehensive baseline assessment of hormones relevant to your picture: testosterone, estradiol, progesterone, thyroid, DHEA, and others as indicated. Your provider designs a personalized protocol with bioidentical hormones. Follow-up labs guide dose adjustment over time.", "categories": ["Your Wellness"], "concerns": ["Hormone health", "Energy & vitality"], "treatment": "Hormone Support", "keywords": "hormone support what involves labs baseline assessment bioidentical protocol VIO"}, {"id": "hor2", "type": "treatment", "question": "How do I know if my hormones are the issue?", "answer": "Symptoms of hormonal imbalance include fatigue that sleep does not fix, difficulty maintaining body composition, low desire, mood instability, brain fog, poor sleep quality, and perimenopausal symptoms. These can have many causes \u2014 but hormones are frequently central. Labs tell the story.", "categories": ["Your Wellness"], "concerns": ["Hormone health", "Energy & vitality"], "treatment": "Hormone Support", "keywords": "how know hormones issue symptoms fatigue mood brain fog body composition labs"}, {"id": "hor3", "type": "treatment", "question": "Are bioidentical hormones safe?", "answer": "Bioidentical hormones have a molecular structure identical to the hormones your body naturally produces \u2014 processed through the same pathways as endogenous hormones. Your provider reviews your individual risk profile and monitors your response through regular labs.", "categories": ["Your Wellness"], "concerns": ["Hormone health", "Safety"], "treatment": "Hormone Support", "keywords": "bioidentical hormones safe BHRT natural synthetic difference"}, {"id": "irec1", "type": "treatment", "question": "What is in Recover IV?", "answer": "Amino acids for muscle repair, B-complex vitamins for energy metabolism and neurological recovery, magnesium for muscle function and inflammation, Vitamin C for tissue repair, and electrolytes for cellular restoration \u2014 all at immediate bioavailability through IV delivery.", "categories": ["Your Wellness"], "concerns": ["Energy & vitality", "Immune support"], "treatment": "Recover IV", "keywords": "recover IV what contains amino acids B vitamins magnesium vitamin C muscle"}, {"id": "iper1", "type": "treatment", "question": "What is Perform IV and when should I use it?", "answer": "Perform IV primes the body before demand peaks \u2014 B vitamins, amino acids, magnesium, and electrolytes delivered directly into the bloodstream so they are available when performance requires them. Before a competition, significant physical event, or high-stakes professional demand.", "categories": ["Your Wellness"], "concerns": ["Energy & vitality"], "treatment": "Perform IV", "keywords": "perform IV what is pre-event preparation before peak demand competition"}, {"id": "iimm1", "type": "treatment", "question": "What is Immune IV?", "answer": "Immune IV delivers high-dose Vitamin C, Zinc, B vitamins, and Glutathione together at concentrations not achievable through oral supplementation \u2014 nutrients with established and complementary roles in immune function. Used proactively or restorative after illness.", "categories": ["Your Wellness"], "concerns": ["Immune support"], "treatment": "Immune IV", "keywords": "immune IV what is vitamin C zinc glutathione B vitamins immune function high dose"}, {"id": "imv1", "type": "treatment", "question": "How is the IM Vitamin Injection protocol determined?", "answer": "By labs and clinical assessment \u2014 not a preset formula. Your provider identifies which vitamins are deficient in your blood panel and prescribes accordingly. The difference between targeted IM repletion and a multivitamin is clinical specificity.", "categories": ["Your Wellness"], "concerns": ["Energy & vitality", "Immune support"], "treatment": "IM Vitamin Injections", "keywords": "IM vitamins how determined labs clinical assessment specific deficiency targeted"}, {"id": "prpc1", "type": "treatment", "question": "What is PRP and how is it different from PRF?", "answer": "Both are autologous, growth factor-based treatments derived from your own blood. PRP is a liquid platelet concentrate delivering growth factors as an immediate bolus. PRF EZ Gel is a fibrin matrix releasing them slowly over time. For skin and under-eye applications, PRF's slower release may sustain the regenerative signal longer.", "categories": ["Your Face"], "concerns": ["Volume loss", "Under-eye", "Collagen & regeneration"], "treatment": "Platelet-Rich Plasma (PRP)", "keywords": "PRP vs PRF difference liquid plasma fibrin gel slow release autologous"}, {"id": "prpc2", "type": "treatment", "question": "What is PRP used for at VIO?", "answer": "PRP is used as a standalone injectable for under-eye hollows and fine surface lines, topically during microneedling to amplify collagen induction, and in scalp treatment for hair restoration.", "categories": ["Your Face"], "concerns": ["Volume loss", "Under-eye", "Collagen & regeneration"], "treatment": "Platelet-Rich Plasma (PRP)", "keywords": "PRP used for VIO under eye microneedling PRP facial scalp hair restoration"}, {"id": "vg8", "type": "vio-general", "question": "Do you offer virtual or phone consultations?", "answer": "At this time, VIO consultations happen in person at your location \u2014 because the clinical conversation that guides your plan requires seeing you face to face. Your provider reads your skin, assesses your anatomy, and designs a pathway that is specific to your physical presentation. That is not something that translates through a screen. Use Find Your VIO at viomedspa.com to book a consultation at the location nearest you.", "categories": ["VIO General"], "concerns": ["First Timer"], "treatment": "", "keywords": "virtual phone consultation telehealth remote"}, {"id": "vg9", "type": "vio-general", "question": "What should I expect at my first appointment?", "answer": "Your first visit at VIO is a clinical consultation \u2014 a conversation about your history, your concerns, your goals, and what you want your relationship with your body to look like over time. Your provider will assess your skin and facial anatomy, ask about your health history and any medications, and design a personalized plan. You are never pressured to book a treatment at that appointment. The goal is clarity, not a transaction.", "categories": ["VIO General"], "concerns": ["First Timer"], "treatment": "", "keywords": "first appointment what to expect consultation arrival"}, {"id": "vg10", "type": "vio-general", "question": "Is VIO right for men?", "answer": "Yes. VIO serves clients across every demographic \u2014 the clinical standard and the warmth of the experience do not change based on who walks in. Neuromodulators, skin treatments, body contouring, and the full wellness menu are as relevant to men as to anyone. If you are new to aesthetic wellness and unsure where to start, a consultation is the right first step.", "categories": ["VIO General"], "concerns": ["First Timer"], "treatment": "", "keywords": "men male gender inclusive all demographics"}, {"id": "vg11", "type": "vio-general", "question": "What is the VIO standard of care?", "answer": "Every VIO provider is a licensed clinical professional \u2014 nurse practitioners, registered nurses, and physician assistants with specialized training in aesthetic medicine. VIO holds an annual clinical training event, VIO University, maintains an advisory board, and operates as a 300-person clinical collective that shares standards, outcomes, and protocols across every location. Your treatment is not improvised. It is guided by a standard that has been built deliberately.", "categories": ["VIO General"], "concerns": ["Safety", "First Timer"], "treatment": "", "keywords": "vio standard care clinical training credentials expertise"}, {"id": "vg12", "type": "vio-general", "question": "Are VIO treatments safe during pregnancy or breastfeeding?", "answer": "Most aesthetic treatments \u2014 injectables, lasers, chemical peels, and many wellness protocols \u2014 are not recommended during pregnancy or breastfeeding. Safety in this context is not about risk tolerance; it is about the clinical standard. If you are pregnant or breastfeeding, let your provider know at booking and at your appointment. There are treatments appropriate for this stage \u2014 your provider will identify them and ensure your plan reflects where you are.", "categories": ["VIO General"], "concerns": ["Safety"], "treatment": "", "keywords": "pregnancy breastfeeding safe treatments contraindications"}, {"id": "vg13", "type": "vio-general", "question": "What age do I need to be for VIO treatments?", "answer": "Most VIO treatments require clients to be 18 or older. Certain treatments \u2014 like some dermal fillers \u2014 have FDA-cleared indications for adults 21 and over. Your provider will confirm eligibility at your consultation. If you are under 18 and interested in starting a skin health relationship early, a consultation is a good starting point to understand what is appropriate for your age and stage.", "categories": ["VIO General"], "concerns": ["First Timer"], "treatment": "", "keywords": "age requirement minimum age 18 21 younger"}, {"id": "bk1", "type": "vio-general", "question": "How do I book an appointment at VIO?", "answer": "Book online at viomedspa.com using the Find Your VIO location finder, then select your service and preferred time. You can also call your nearest VIO location directly \u2014 every location has a team ready to help you find the right appointment. First-time clients are encouraged to start with a consultation before selecting specific treatments.", "categories": ["Booking"], "concerns": ["First Timer"], "treatment": "", "keywords": "how to book appointment online booking process"}, {"id": "bk2", "type": "vio-general", "question": "What is the cancellation policy at VIO?", "answer": "VIO requires 24 hours notice to cancel or reschedule a facial or skin treatment appointment. Injectable, laser, and wellness appointments require 48 hours notice given the clinical preparation involved. Late cancellations and no-shows may incur a fee. We understand that circumstances arise \u2014 if you need to reschedule, contact your location as early as possible and your team will do everything they can to accommodate you.", "categories": ["Booking"], "concerns": ["First Timer"], "treatment": "", "keywords": "cancellation policy reschedule no show fee notice"}, {"id": "bk3", "type": "vio-general", "question": "What should I bring or do to prepare for my appointment?", "answer": "For injectable appointments: arrive without heavy makeup if possible, avoid alcohol for 24 hours prior, and let your provider know if you are taking any blood-thinning medications (aspirin, NSAIDs, fish oil). For laser or peel treatments: avoid sun exposure and tanning for two weeks prior, and discontinue retinol for five to seven days beforehand. For wellness appointments: bring a list of current medications and supplements. Your provider will confirm preparation specifics when you book.", "categories": ["Booking"], "concerns": ["First Timer", "Safety"], "treatment": "", "keywords": "prepare appointment what to bring pre treatment preparation"}, {"id": "bk4", "type": "vio-general", "question": "Can I combine multiple treatments in one visit?", "answer": "Yes \u2014 and at VIO, your provider often designs a plan that sequences treatments intentionally across a single visit or across multiple visits. Some combinations are clinically appropriate on the same day (neuromodulators and fillers, for example). Others require sequencing \u2014 laser treatments and certain peels need to be spaced from injectables. Your provider will map the order and timing that serves your outcome best.", "categories": ["Booking"], "concerns": ["First Timer"], "treatment": "", "keywords": "combine treatments same day multiple visit sequence"}, {"id": "bk5", "type": "vio-general", "question": "How far in advance should I book?", "answer": "For consultations, we can often accommodate within one to two weeks. For specific treatments \u2014 particularly injectable appointments with high-demand providers or pre-event timing \u2014 booking two to four weeks in advance is recommended. ClubVIO members receive booking priority at their location.", "categories": ["Booking"], "concerns": ["Maintenance", "ClubVIO"], "treatment": "", "keywords": "how far advance book timing availability appointment"}, {"id": "bk6", "type": "vio-general", "question": "What if I arrive late?", "answer": "Let your location know as soon as possible if you are running behind. Arriving more than 15 minutes late for a facial or skin appointment, or more than 10 minutes late for an injectable or laser appointment, may require rescheduling to protect the time your treatment requires. We will always do our best to accommodate \u2014 your provider's time and the quality of your treatment are both worth protecting.", "categories": ["Booking"], "concerns": ["First Timer"], "treatment": "", "keywords": "late arrival running late reschedule policy"}, {"id": "bk7", "type": "vio-general", "question": "Do you offer gift cards?", "answer": "Yes. VIO gift cards are available for purchase at your location or through viomedspa.com and can be applied to any treatment or service in the VIO menu. They represent a meaningful way to introduce someone to the VIO standard \u2014 and to the beginning of a relationship with their body that compounds over time.", "categories": ["Booking"], "concerns": ["First Timer"], "treatment": "", "keywords": "gift card purchase give send present"}, {"id": "cl3", "type": "vio-general", "question": "What are the ClubVIO membership tiers?", "answer": "ClubVIO has two membership tiers \u2014 Signature and Elite \u2014 with monthly credit that draws upon VIO's full service menu at preferred member rates. Signature is the foundational tier. Elite offers a higher monthly credit and deeper access. At select locations, a limited number of Founding Member spots are available at the Signature rate, permanently locked. Your location team can walk you through the specific benefits at each tier.", "categories": ["Membership"], "concerns": ["ClubVIO", "Membership"], "treatment": "", "keywords": "clubvio tiers signature elite levels difference"}, {"id": "cl4", "type": "vio-general", "question": "How does the ClubVIO monthly credit work?", "answer": "Each month, your membership credits your VIO account with a balance you can draw upon across the full service menu. You choose how to use it \u2014 a single treatment, a combination of services, or building toward something larger. Unused balance does not automatically roll forward \u2014 your team can advise on how to make the most of your monthly credit before it resets.", "categories": ["Membership"], "concerns": ["ClubVIO", "Membership"], "treatment": "", "keywords": "clubvio credit how does it work monthly balance use"}, {"id": "cl5", "type": "vio-general", "question": "Can I use my ClubVIO membership at any VIO location?", "answer": "Yes. Your ClubVIO membership is valid at any VIO location across all markets \u2014 Ohio, Boston, New York, Texas, Florida, and Tennessee. If you travel or relocate, your membership and your clinical history travel with you.", "categories": ["Membership"], "concerns": ["ClubVIO", "Membership"], "treatment": "", "keywords": "clubvio use other locations travel multiple locations"}, {"id": "cl6", "type": "vio-general", "question": "How do I pause or cancel my ClubVIO membership?", "answer": "To pause your membership temporarily, contact your location team \u2014 pauses are available for circumstances like travel, pregnancy, or recovery. To cancel, reach out to your VIO location or contact us through viomedspa.com. Cancellations are subject to the terms of your membership agreement. Founding Members hold a permanently locked rate \u2014 cancellation releases that rate and it cannot be reclaimed.", "categories": ["Membership"], "concerns": ["ClubVIO", "Membership"], "treatment": "", "keywords": "pause cancel membership freeze hold clubvio"}, {"id": "cl7", "type": "vio-general", "question": "What are the preferred rates for ClubVIO members?", "answer": "ClubVIO members access preferred rates across the full VIO service menu \u2014 the specific rate differences by tier and service are outlined at your location. The member rate applies to treatments beyond your monthly credit draw as well, so the value compounds the more you engage with VIO's menu. Contact your location for current pricing.", "categories": ["Membership"], "concerns": ["ClubVIO", "Membership", "Cost"], "treatment": "", "keywords": "clubvio member rates discount pricing preferred rate"}, {"id": "cl8", "type": "vio-general", "question": "Is there a minimum commitment period for ClubVIO?", "answer": "Yes. ClubVIO memberships have a minimum term \u2014 typically three to six months depending on the tier \u2014 after which membership continues month to month until you choose to pause or cancel. The minimum commitment reflects VIO's philosophy: the relationship between you and your body, guided by VIO, is one that compounds. A meaningful commitment period ensures you experience that.", "categories": ["Membership"], "concerns": ["ClubVIO", "Membership"], "treatment": "", "keywords": "clubvio commitment minimum term contract months"}, {"id": "cl9", "type": "vio-general", "question": "What is the V-List?", "answer": "The V-List is ClubVIO's access tier \u2014 reserved for members whose relationship with VIO goes deepest. V-List members receive first access to new services, invitations to clinical and community events, and priority scheduling. It is not advertised as a points program or a rewards system. It is recognition of the people who have made VIO a consistent part of how they live.", "categories": ["Membership"], "concerns": ["ClubVIO", "Membership"], "treatment": "", "keywords": "V-List VIP access tier clubvio top members"}, {"id": "sc1", "type": "vio-general", "question": "Does VIO carry skincare products?", "answer": "Yes. VIO carries a curated selection of clinical skincare \u2014 including the VIO skincare line and other partners selected for clinical efficacy and alignment with VIO's standard. The products available at your location are the same products your providers use and recommend. Nothing on the shelf is there for margin. It is there because it works and because it belongs in the hands of the people VIO serves.", "categories": ["Skincare"], "concerns": ["Skin quality"], "treatment": "", "keywords": "skincare products retail VIO skincare shop what do you carry"}, {"id": "sc2", "type": "vio-general", "question": "What is VIO skincare and why does VIO carry it?", "answer": "VIO skincare is a clinical skincare brand developed by advanced practice providers \u2014 nurse practitioners and physician assistants \u2014 who specialize in aesthetic medicine. Their formulations are built around the same clinical logic that guides in-clinic treatment: ingredient efficacy, skin barrier support, and outcomes that are visible and lasting. VIO carries VIO skincare because the standard in the bottle matches the standard in the room.", "categories": ["Skincare"], "concerns": ["Skin quality"], "treatment": "", "keywords": "VIO skincare what is skincare brand why VIO"}, {"id": "sc3", "type": "vio-general", "question": "How do I know which skincare products are right for me?", "answer": "Your VIO provider is the right starting point. During your consultation or any treatment appointment, your provider can assess your skin and recommend a home care regimen that supports and extends what happens in the clinic. A clinical skincare routine is not a shelf-selection \u2014 it is part of your broader skin health plan. Your provider will connect the dots between what you are doing in-clinic and what you are doing at home.", "categories": ["Skincare"], "concerns": ["Skin quality", "First Timer"], "treatment": "", "keywords": "skincare which products right for me recommendations routine"}, {"id": "sc4", "type": "vio-general", "question": "Can I purchase VIO skincare products online?", "answer": "VIO skincare products are also available directly through VIO skincare.com. For personalized product recommendations specific to your skin history at VIO, your location team can guide you \u2014 and your provider's knowledge of your skin makes those recommendations more precise than any quiz.", "categories": ["Skincare"], "concerns": ["Skin quality"], "treatment": "", "keywords": "buy online skincare products ship purchase"}, {"id": "sc5", "type": "vio-general", "question": "What skincare routine should I follow after a treatment?", "answer": "Post-treatment skincare varies by treatment. As a general principle: after any laser, peel, or microneedling treatment, your skin needs gentle support \u2014 a mild cleanser, a barrier-supporting moisturizer, and broad-spectrum SPF. Retinols, acids, and active serums should be paused for the number of days your provider specifies. Your provider will give you a specific post-care protocol at your appointment \u2014 follow it exactly. The home care window after treatment is when much of the result is established.", "categories": ["Skincare"], "concerns": ["Skin quality", "Downtime", "Safety"], "treatment": "", "keywords": "skincare after treatment post care routine what to use"}, {"id": "sc6", "type": "vio-general", "question": "Does SPF matter that much?", "answer": "Yes \u2014 and it is not optional at VIO. Sun protection is the single most impactful thing you can do to preserve every treatment result and support the long-term health of your skin. UV exposure drives pigmentation, collagen breakdown, and skin aging at a rate that no in-clinic treatment can fully outpace if you are not protecting the skin daily. Broad-spectrum SPF 30 or higher, every day, regardless of cloud cover or season. Your provider will recommend the right formulation for your skin type.", "categories": ["Skincare"], "concerns": ["Skin quality", "Maintenance"], "treatment": "", "keywords": "SPF sunscreen sun protection daily skincare importance"}, {"id": "pay1", "type": "vio-general", "question": "Does VIO accept insurance?", "answer": "VIO is a medical aesthetics and wellness practice \u2014 the treatments and services offered are elective and not covered by health insurance. Payment is made directly for each service or through your ClubVIO membership. Certain wellness treatments may be eligible for FSA or HSA reimbursement \u2014 confirm with your benefits provider. VIO does not accept CareCredit at this time.", "categories": ["Payment"], "concerns": ["Cost"], "treatment": "", "keywords": "insurance coverage health insurance FSA HSA payment"}, {"id": "pay2", "type": "vio-general", "question": "What payment methods does VIO accept?", "answer": "VIO accepts all major credit and debit cards. Your card is kept securely on file when you book \u2014 it is not charged until after your appointment. ClubVIO membership billing is automatic on your selected monthly date. If you have questions about billing, your location team handles those directly.", "categories": ["Payment"], "concerns": ["Cost"], "treatment": "", "keywords": "payment methods credit card debit billing accepted"}, {"id": "pay3", "type": "vio-general", "question": "Do you display pricing on the website?", "answer": "VIO's service menu includes starting prices for all treatments. Exact pricing depends on the service, the amount of product used, and the plan your provider designs \u2014 which is why pricing is most accurately discussed at your consultation. The VIO standard is that you know what you are investing before the appointment begins. No surprises.", "categories": ["Payment"], "concerns": ["Cost"], "treatment": "", "keywords": "pricing cost how much website starting price"}, {"id": "pay4", "type": "vio-general", "question": "Does VIO offer financing or payment plans?", "answer": "Contact your nearest VIO location for information on available financing options. Payment plans are location-specific and depend on the services being planned.", "categories": ["Payment"], "concerns": ["Cost"], "treatment": "", "keywords": "financing payment plan installments affordability"}, {"id": "ct1", "type": "vio-general", "question": "How can I get in touch with VIO?", "answer": "There are four ways to reach us. Chat with us directly through the chat feature on viomedspa.com \u2014 the fastest way to get a question answered. Contact your nearest VIO location by phone or in person \u2014 for anything appointment-specific, your location team knows your history and can help most directly. Reach VIO Corporate for press, partnership, or general inquiries at viomedspa.com. And if you are interested in owning a VIO franchise, there is a dedicated pathway for that conversation as well.", "categories": ["Contact"], "concerns": ["First Timer"], "treatment": "", "keywords": "contact get in touch help support how to reach VIO"}, {"id": "ct2", "type": "vio-general", "question": "How do I chat with VIO online?", "answer": "Use the chat feature on viomedspa.com \u2014 available during business hours \u2014 to connect with a member of the VIO team in real time. For questions about treatments, membership, booking, or anything you want answered before you come in, the chat is the fastest route. For clinical questions specific to your care, your location team or your provider is the right conversation.", "categories": ["Contact"], "concerns": ["First Timer"], "treatment": "", "keywords": "chat online live chat website support message"}, {"id": "ct3", "type": "vio-general", "question": "How do I reach out to VIO Corporate?", "answer": "For press and media inquiries, partnership proposals, general brand questions, or matters that fall outside of a specific location's scope \u2014 reach out through the contact form at viomedspa.com. VIO Corporate responds to all inquiries and will direct you to the right person.", "categories": ["Contact"], "concerns": ["First Timer"], "treatment": "", "keywords": "corporate contact press media partnership brand inquiry"}, {"id": "ct4", "type": "vio-general", "question": "How do I find my nearest VIO location?", "answer": "Use the Find Your VIO tool at viomedspa.com. Current locations span Ohio, Boston, New York, Texas, Florida, and Tennessee. Each location page includes address, hours, booking, and direct contact information. New locations are added as the network grows \u2014 sign up for updates at viomedspa.com to be the first to know.", "categories": ["Contact"], "concerns": ["First Timer"], "treatment": "", "keywords": "find location nearest VIO map address hours states"}, {"id": "ct5", "type": "vio-general", "question": "How do I inquire about owning a VIO franchise?", "answer": "VIO is var entry_by_id = {};
ALL_ENTRIES.forEach(function(e){ entry_by_id[e.id] = e; });

var currentArea = 'all';
var currentConcern = '';
var openEntryId = null;
var concernRowOpen = false;

// Build FAQ index
var faqByTreatment = {};
ALL_FAQS.forEach(function(f){
  var t = (f.treatment||'').toLowerCase().trim();
  if(t){
    if(!faqByTreatment[t]) faqByTreatment[t] = [];
    faqByTreatment[t].push(f);
  }
});

function getFAQs(entry) {
  var name = entry.name.toLowerCase().replace(/[^a-z0-9 ]/g,'');
  var matched = [], seen = {};
  Object.keys(faqByTreatment).forEach(function(t){
    var tn = t.replace(/[^a-z0-9 ]/g,'');
    if(tn.length < 3) return;
    var nameWords = name.split(' ').filter(function(w){ return w.length>3; });
    var tWords = tn.split(' ').filter(function(w){ return w.length>3; });
    var overlap = nameWords.some(function(w){ return tWords.indexOf(w)>-1; }) ||
                  tWords.some(function(w){ return nameWords.indexOf(w)>-1; });
    if(overlap){
      faqByTreatment[t].forEach(function(f){
        if(!seen[f.id]){ seen[f.id]=true; matched.push(f); }
      });
    }
  });
  // Category fallback for fillers
  var cat = (entry.vio_category||'').toLowerCase();
  if(cat.indexOf('filler')>-1 || cat.indexOf('collagen')>-1){
    (faqByTreatment['dermal fillers']||[]).forEach(function(f){
      if(!seen[f.id]){ seen[f.id]=true; matched.push(f); }
    });
  }
  return matched.slice(0,5);
}

function e2t(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function getFiltered(){
  var q = (document.getElementById('srch').value||'').toLowerCase();
  return ALL_ENTRIES.filter(function(e){
    var cat = e.vio_category||'';
    var ma = currentArea==='all' || cat.indexOf(currentArea)===0;
    var mc = !currentConcern || (CONCERNS[currentConcern]||[]).indexOf(e.id)>-1;
    var mq = !q || e.name.toLowerCase().indexOf(q)>-1 ||
              (e.plain_language_summary||'').toLowerCase().indexOf(q)>-1 ||
              (e.tags||[]).some(function(t){ return t.toLowerCase().indexOf(q)>-1; }) ||
              (e.brand||'').toLowerCase().indexOf(q)>-1;
    return ma && mc && mq;
  });
}

// Filter bar tabs — event delegation
document.querySelector('.filter-inner').addEventListener('click', function(e){
  var tab = e.target.closest('.ftab');
  if(!tab) return;
  if(tab.id === 'concern-toggle'){
    concernRowOpen = !concernRowOpen;
    document.getElementById('concern-row').classList.toggle('vis', concernRowOpen);
    tab.innerHTML = concernRowOpen ? 'By Concern &#9652;' : 'By Concern &#9662;';
    return;
  }
  if(tab.dataset.area !== undefined){
    currentArea = tab.dataset.area;
    document.querySelectorAll('.ftab[data-area]').forEach(function(t){ t.classList.remove('active'); });
    tab.classList.add('active');
    renderLib();
  }
});

// Concern chips — event delegation
document.getElementById('concern-row').addEventListener('click', function(e){
  var chip = e.target.closest('.cf-chip');
  if(!chip) return;
  currentConcern = chip.dataset.concern || '';
  document.querySelectorAll('.cf-chip').forEach(function(c){ c.classList.remove('active'); });
  chip.classList.add('active');
  renderLib();
});

// Search
document.getElementById('srch').addEventListener('input', renderLib);

var catOrder = ["Your Face \u2014 Wrinkle Relaxers", "Your Face \u2014 Dermal Fillers", "Your Face \u2014 Collagen Production", "Your Face \u2014 Lift & Contour", "Your Skin \u2014 Facials", "Your Skin \u2014 Microneedling", "Your Skin \u2014 Laser & Light Therapy", "Your Skin \u2014 Peels", "Your Body \u2014 Body Contouring", "Your Body \u2014 Skin Tightening & Resurfacing", "Your Body \u2014 Hair & Scalp Restoration", "Your Wellness \u2014 Metabolic Health", "Your Wellness \u2014 Hormone Support", "Your Wellness \u2014 Peptide Therapy", "Your Wellness \u2014 Nutrient Therapy"];

function renderLib(){
  var entries = getFiltered();
  document.getElementById('results-meta').textContent = entries.length + ' treatment' + (entries.length!==1?'s':'');
  var grid = document.getElementById('lib-grid');
  if(!entries.length){
    grid.innerHTML = '<div class="empty-state"><div class="empty-h">Nothing found.</div><p style="font-size:13px">Try a different filter or search term.</p></div>';
    return;
  }
  var groups = {};
  entries.forEach(function(e){
    var cat = e.vio_category||'Other';
    if(!groups[cat]) groups[cat]=[];
    groups[cat].push(e);
  });
  var orderedCats = catOrder.filter(function(c){ return groups[c]; });
  Object.keys(groups).forEach(function(c){ if(orderedCats.indexOf(c)<0) orderedCats.push(c); });

  var html = '';
  orderedCats.forEach(function(cat){
    var ces = groups[cat]; if(!ces) return;
    var parts = cat.split('\u2014').join('—').split('—');
    var catDisplay = parts.length>1 ? parts[1].trim() : cat;
    var parentDisplay = parts.length>1 ? parts[0].trim() : '';
    var safeId = cat.replace(/[^a-zA-Z0-9]/g,'_');
    html += '<div class="cat-section"><div class="cat-label">';
    if(parentDisplay) html += '<div class="cat-parent">'+e2t(parentDisplay)+'</div>';
    html += '<div class="cat-name">'+e2t(catDisplay)+'</div></div>';
    html += '<div class="t-grid" id="g_'+safeId+'">';
    ces.forEach(function(e){ html += renderCard(e); });
    html += '</div></div>';
  });
  grid.innerHTML = html;
  attachCardEvents();
}

function renderCard(e){
  var catParts = (e.vio_category||'').split('—');
  var catShort = catParts.length>1?catParts[1].trim():(e.vio_category||'');
  var brandShort = (e.brand||'').split('/')[0].trim().split(',')[0].trim();
  return '<div class="t-card" id="card_'+e.id+'" data-eid="'+e.id+'">'
    +'<div class="tc-head">'
    +'<div class="tc-name">'+e2t(e.name)+'</div>'
    +(brandShort?'<div class="tc-brand">'+e2t(brandShort)+'</div>':'')
    +'<div class="tc-sum">'+e2t(e.plain_language_summary||'')+'</div>'
    +'</div>'
    +'<div class="tc-foot"><div class="tc-cat">'+e2t(catShort)+'</div><div class="tc-exp" id="exp_'+e.id+'">Read more &#8595;</div></div>'
    +'</div>'
    +'<div class="t-panel" id="panel_'+e.id+'">'+renderPanel(e)+'</div>';
}

function renderPanel(e){
  var efaqs = getFAQs(e);
  var related = (RELATED[e.id]||[]).map(function(rid){ return entry_by_id[rid]; }).filter(Boolean);
  var areas = e.treatment_areas||[];

  var stats = '';
  if(e.onset) stats += '<div class="tp-stat"><div class="tp-sl">Onset</div><div class="tp-sv">'+e2t(e.onset)+'</div></div>';
  if(e.duration) stats += '<div class="tp-stat"><div class="tp-sl">Duration</div><div class="tp-sv">'+e2t(e.duration)+'</div></div>';
  if(e.ideal_candidate) stats += '<div class="tp-stat"><div class="tp-sl">Best For</div><div class="tp-sv">'+e2t(e.ideal_candidate.substring(0,100))+'</div></div>';

  var faqsHtml = efaqs.length
    ? efaqs.map(function(f){
        return '<div class="faq-item" data-fid="'+f.id+'_'+e.id+'">'
          +'<div class="faq-q"><div class="faq-qt">'+e2t(f.question)+'</div><span class="faq-chv">&#9662;</span></div>'
          +'<div class="faq-ans"><div class="faq-ans-txt">'+e2t(f.answer)+'</div></div>'
          +'</div>';
      }).join('')
    : '<div class="faq-none">Questions about this treatment are answered at your VIO consultation &mdash; where the conversation is specific to you.</div>';

  var relHtml = related.length
    ? '<div class="tp-related"><div class="tp-rel-ttl">Related Treatments</div><div class="rel-cards">'
      +related.map(function(r){
        var rc=(r.vio_category||'').split('—');
        var rs=rc.length>1?rc[1].trim():r.vio_category||'';
        return '<div class="rel-card" data-eid="'+r.id+'"><div class="rel-name">'+e2t(r.name)+'</div><div class="rel-cat">'+e2t(rs)+'</div></div>';
      }).join('')+'</div></div>'
    : '';

  return '<div class="tp-inner">'
    +'<button class="tp-close" data-close="'+e.id+'">Close &#215;</button>'
    +(stats?'<div class="tp-grid">'+stats+'</div>':'')
    +(e.mechanism?'<div class="tp-sec"><div class="tp-sec-lbl">How It Works</div><div class="tp-body">'+e2t(e.mechanism)+'</div></div>':'')
    +(areas.length?'<div class="tp-sec"><div class="tp-sec-lbl">Treatment Areas</div><div class="tp-areas">'+areas.map(function(a){ return '<span class="tp-area">'+e2t(a)+'</span>'; }).join('')+'</div></div>':'')
    +(e.plain_language_summary?'<div class="tp-sec"><div class="tp-sec-lbl">In Plain Language</div><div class="tp-body">'+e2t(e.plain_language_summary)+'</div></div>':'')
    +(e.contraindications&&e.contraindications.length?'<div class="tp-sec"><div class="tp-sec-lbl">Important Considerations</div><div class="tp-body" style="font-size:12px;color:rgba(3,3,3,.65)">'+e2t(e.contraindications.join(' · '))+'</div></div>':'')
    +(e.tags&&e.tags.length?'<div class="tp-tags">'+e.tags.map(function(t){ return '<span class="tp-tag">'+e2t(t)+'</span>'; }).join('')+'</div>':'')
    +'<div class="tp-faq"><div class="tp-faq-ttl">Common Questions</div>'+faqsHtml+'</div>'
    +relHtml
    +'<div class="tp-cta"><a class="btn-consult" href="https://viomedspa.com/book" target="_blank">Book a Consultation</a><div class="cta-note">Your VIO provider will determine whether this treatment is right for where you are right now.</div></div>'
    +'</div>';
}

function attachCardEvents(){
  // Cards — click to open/close panel
  document.querySelectorAll('.t-card').forEach(function(card){
    card.addEventListener('click', function(){ openEntry(this.dataset.eid); });
  });
  // Close buttons
  document.querySelectorAll('.tp-close').forEach(function(btn){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      closeEntry(this.dataset.close);
    });
  });
  // Related cards
  document.querySelectorAll('.rel-card').forEach(function(rc){
    rc.addEventListener('click', function(e){
      e.stopPropagation();
      openEntry(this.dataset.eid);
    });
  });
  // FAQ items
  document.querySelectorAll('.faq-item').forEach(function(fi){
    fi.querySelector('.faq-q').addEventListener('click', function(e){
      e.stopPropagation();
      fi.classList.toggle('fopen');
    });
  });
}

function openEntry(eid){
  if(openEntryId && openEntryId !== eid) closeEntry(openEntryId);
  var panel = document.getElementById('panel_'+eid);
  var card = document.getElementById('card_'+eid);
  var exp = document.getElementById('exp_'+eid);
  if(!panel) return;
  if(panel.classList.contains('open')){
    closeEntry(eid);
  } else {
    panel.classList.add('open');
    if(card) card.classList.add('open');
    if(exp) exp.innerHTML = 'Close &#8593;';
    openEntryId = eid;
    setTimeout(function(){ panel.scrollIntoView({behavior:'smooth',block:'nearest'}); }, 50);
  }
}

function closeEntry(eid){
  var panel = document.getElementById('panel_'+eid);
  var card = document.getElementById('card_'+eid);
  var exp = document.getElementById('exp_'+eid);
  if(panel) panel.classList.remove('open');
  if(card) card.classList.remove('open');
  if(exp) exp.innerHTML = 'Read more &#8595;';
  if(openEntryId === eid) openEntryId = null;
}

renderLib();
</script>
